name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Validate bundled scenarios
        run: |
          cargo run -- validate scenarios/earth-moon.toml
          cargo run -- validate scenarios/figure-eight.toml
          cargo run -- validate scenarios/solar-system.toml
          cargo run -- validate scenarios/asteroid-belt.toml

      - name: Headless smoke
        run: cargo run -- run scenarios/earth-moon.toml --headless --steps 100
